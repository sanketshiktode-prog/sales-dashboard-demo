function getJFM(tl) {
  const combined = [];
  const nameMap = {};
  MONTHS.forEach(m => {
    (EMPLOYEES_DATA[tl]?.[m] || []).forEach(e => {
      if (!nameMap[e.name]) nameMap[e.name] = { name: e.name, leads: 0, ql: 0, visit: 0, booking: 0, spend: 0, revenue: 0, pipeline: 0 };
      const o = nameMap[e.name];
      o.leads += e.leads; o.ql += e.ql; o.visit += e.visit; o.booking += e.booking;
      o.spend += e.spend; o.revenue += e.revenue; o.pipeline += e.pipeline;
    });
  });
  Object.values(nameMap).forEach(o => {
    o.leadToQL = o.leads > 0 ? Math.round((o.ql / o.leads) * 1000) / 10 : 0;
    o.qlToVisit = o.ql > 0 ? Math.round((o.visit / o.ql) * 1000) / 10 : 0;
    o.visitToBooking = o.visit > 0 ? Math.round((o.booking / o.visit) * 1000) / 10 : 0;
    o.qlToBooking = o.ql > 0 ? Math.round((o.booking / o.ql) * 1000) / 10 : 0;
    o.roas = o.spend > 0 ? Math.round((o.revenue / o.spend) * 100) / 100 : 0;
    combined.push(o);
  });
  return combined;
}

function getEmps(tl, month) {
  if (month === "JFM") return getJFM(tl);
  return EMPLOYEES_DATA[tl]?.[month] || [];
}

                </tr>)}
              </tbody></table></div>
            </div>);
          })}
        </div>)}

        {/* ══ TOP PERFORMERS ══ */}
        {tab === "top_performers" && (() => {
          const tls = role === "Admin" ? TL_LIST : [selectedTL];
          // TL perf
          const tlPerf = tls.map(tl => {
            const e = getEmps(tl, month); const l = e.reduce((a,x)=>a+x.leads,0); const q = e.reduce((a,x)=>a+x.ql,0); const v = e.reduce((a,x)=>a+x.visit,0); const b = e.reduce((a,x)=>a+x.booking,0); const r = e.reduce((a,x)=>a+x.revenue,0); const s = e.reduce((a,x)=>a+x.spend,0);
            return { name: tl, leads: l, ql: q, visit: v, booking: b, revenue: r, pipeline: e.reduce((a,x)=>a+x.pipeline,0), spend: s, team: e.length,
              leadToQL: l>0?Math.round(q/l*1000)/10:0, qlToVisit: q>0?Math.round(v/q*1000)/10:0, visitToBooking: v>0?Math.round(b/v*1000)/10:0, _roas: s>0&&r>0?Math.round(r/s*100)/100:0 };
          });
          // Emp perf
          const empPerf = [];
          tls.forEach(tl => getEmps(tl, month).forEach(e => empPerf.push({ ...e, tl })));

          return (<div>
            {/* TL Leaderboard */}
            {role === "Admin" && (<div style={{background:S.card,borderRadius:12,border:"1px solid "+S.border,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"14px 18px",borderBottom:"1px solid "+S.border,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>🏆</span>
                <div><div style={{fontSize:15,fontWeight:700}}>TL Leaderboard — <span style={{color:S.accent}}>{monthLabel}</span></div></div>
              </div>
              <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>
                {[["Rank",null],["TL","name"],["Leads","leads"],["QL","ql"],["L→QL%","leadToQL"],["Visits","visit"],["QL→V%","qlToVisit"],["Bookings","booking"],["V→B%","visitToBooking"],["Revenue","revenue"],["Pipeline","pipeline"],["Spend","spend"],["ROAS","_roas"]].map(([l,f])=><TH key={l} label={l} field={f} table="tlLead" />)}
              </tr></thead><tbody>
                {getSorted("tlLead", tlPerf).map((t,i)=><tr key={t.name} style={{background:i===0?"rgba(251,191,36,0.06)":"transparent"}}>
                  <td style={{padding:"12px",borderBottom:"1px solid "+S.border,textAlign:"center"}}>{rankBadge(i)}</td>
                  <ClickCell style={{color:S.accent,fontWeight:700}}>{t.name}</ClickCell>
                  <ClickCell style={{color:S.text}}>{fmt(t.leads)}</ClickCell>
                  <ClickCell style={{color:S.blue}}>{fmt(t.ql)}</ClickCell>
                  <ClickCell style={{color:ratioColor(t.leadToQL),fontWeight:700}}>{fmtPct(t.leadToQL)}</ClickCell>
                  <ClickCell style={{color:S.text}}>{fmt(t.visit)}</ClickCell>
                  <ClickCell style={{color:ratioColor(t.qlToVisit)}}>{fmtPct(t.qlToVisit)}</ClickCell>
                  <ClickCell style={{color:S.green}}>{fmt(t.booking)}</ClickCell>
                  <ClickCell style={{color:ratioColor(t.visitToBooking)}}>{fmtPct(t.visitToBooking)}</ClickCell>
                  <ClickCell style={{color:t.revenue>0?S.green:S.textDim,fontWeight:700}}>{fmtCur(t.revenue)}</ClickCell>
                  <ClickCell style={{color:t.pipeline>0?"#a78bfa":S.textDim}}>{fmtCur(t.pipeline)}</ClickCell>
                  <ClickCell style={{color:S.red}}>{fmtCur(t.spend)}</ClickCell>
                  <ClickCell style={{color:t._roas>0?S.green:S.textDim,fontWeight:700}}>{t._roas>0?t._roas+"x":"—"}</ClickCell>
                </tr>)}
              </tbody></table></div>
            </div>)}

            {/* Employee Leaderboard */}
            <div style={{background:S.card,borderRadius:12,border:"1px solid "+S.border,overflow:"hidden"}}>
              <div style={{padding:"14px 18px",borderBottom:"1px solid "+S.border,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>⭐</span>
                <div>
                  <div style={{fontSize:15,fontWeight:700}}>Employee Leaderboard — <span style={{color:S.accent}}>{monthLabel}</span></div>
                  <div style={{fontSize:11,color:S.textDim}}>Sort by any column to find top & low performers</div>
                </div>
              </div>
              <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>
                {[["Rank",null],["Employee","name"],["TL","tl"],["Leads","leads"],["QL","ql"],["L→QL%","leadToQL"],["Visits","visit"],["QL→V%","qlToVisit"],["Booking","booking"],["V→B%","visitToBooking"],["Revenue","revenue"],["Pipeline","pipeline"],["Spend","spend"],["ROAS","roas"]].map(([l,f])=><TH key={l} label={l} field={f} table="empLead" />)}
              </tr></thead><tbody>
                {getSorted("empLead", empPerf).map((e,i) => {
                  const isTop = e.leadToQL >= 40 && e.leads >= 20;
                  const isLow = e.leadToQL < 20 && e.leads >= 20;
                  return (<tr key={e.name+e.tl} style={{background: isTop ? "rgba(52,211,153,0.04)" : isLow ? "rgba(248,113,113,0.04)" : "transparent"}}>
                    <td style={{padding:"10px 12px",borderBottom:"1px solid "+S.border,textAlign:"center"}}>{rankBadge(i)}</td>
                    <ClickCell onClick={()=>openCellModal(e.name,{TL:e.tl,Leads:fmt(e.leads),QL:fmt(e.ql),"L→QL":fmtPct(e.leadToQL),"QL→V":fmtPct(e.qlToVisit),"V→B":fmtPct(e.visitToBooking),Revenue:fmtCur(e.revenue),Pipeline:fmtCur(e.pipeline)})} style={{color:S.text,fontWeight:600,whiteSpace:"nowrap",position:"relative"}}>
                      {e.name} {isTop && <span style={{fontSize:10,color:S.green,marginLeft:4}}>★ TOP</span>} {isLow && <span style={{fontSize:10,color:S.red,marginLeft:4}}>▼ LOW</span>}
                    </ClickCell>
                    <ClickCell style={{color:S.accent,fontSize:12}}>{e.tl}</ClickCell>
                    <ClickCell style={{color:S.text}}>{fmt(e.leads)}</ClickCell>
                    <ClickCell style={{color:S.blue}}>{fmt(e.ql)}</ClickCell>
                    <ClickCell style={{color:ratioColor(e.leadToQL),fontWeight:700}}>{fmtPct(e.leadToQL)}</ClickCell>
                    <ClickCell style={{color:S.text}}>{fmt(e.visit)}</ClickCell>
                    <ClickCell style={{color:ratioColor(e.qlToVisit)}}>{fmtPct(e.qlToVisit)}</ClickCell>
                    <ClickCell style={{color:S.green}}>{fmt(e.booking)}</ClickCell>
                    <ClickCell style={{color:ratioColor(e.visitToBooking)}}>{fmtPct(e.visitToBooking)}</ClickCell>
                    <ClickCell style={{color:e.revenue>0?S.green:S.textDim,fontWeight:e.revenue>0?700:400}}>{fmtCur(e.revenue)}</ClickCell>
                    <ClickCell style={{color:e.pipeline>0?"#a78bfa":S.textDim}}>{fmtCur(e.pipeline)}</ClickCell>
                    <ClickCell style={{color:S.red}}>{fmtCur(e.spend)}</ClickCell>
                    <ClickCell style={{color:e.roas>0?S.green:S.textDim}}>{e.roas>0?e.roas+"x":"—"}</ClickCell>
                  </tr>);
                })}
              </tbody></table></div>
            </div>
          </div>);
        })()}

        <div style={{textAlign:"center",padding:"32px 0 16px",color:S.textDim,fontSize:11}}>
          Pune Operations Dashboard · Jan–Mar 2026 · {role} View
        </div>
      </div>
      <CellModal data={modal} onClose={() => setModal(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
